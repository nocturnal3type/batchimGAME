<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그림쟁이 🎨</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #faf7f0;
    --accent: #e63946;
    --green: #2a9d8f;
    --blue: #457b9d;
    --warn: #f4a261;
    --line: rgba(26,26,46,0.13);
    --bg: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--paper);
    background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,200,220,0.17) 27px, rgba(180,200,220,0.17) 28px);
    min-height: 100vh;
    color: var(--ink);
  }

  header {
    background: var(--ink);
    padding: 11px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--accent);
  }
  .logo { font-family: 'Gaegu', cursive; font-size: 24px; font-weight: 700; color: white; }
  .logo em { color: var(--warn); font-style: normal; }
  .header-right { font-size: 12px; color: rgba(255,255,255,0.5); }

  /* ── 레이아웃 ── */
  .layout {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 14px;
    max-width: 900px;
    margin: 0 auto;
    padding: 14px;
    align-items: start;
  }

  /* ── 사이드바 ── */
  .sidebar > * { margin-bottom: 12px; }

  .box {
    background: var(--bg);
    border: 2px solid var(--ink);
    border-radius: 12px;
    box-shadow: 0 4px 0 var(--ink);
    overflow: hidden;
  }
  .box-head {
    background: var(--ink);
    color: white;
    padding: 8px 13px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .box-body { padding: 13px; }

  /* 단어 카드 */
  .word-card {
    background: var(--ink);
    border-radius: 8px;
    padding: 16px 10px;
    text-align: center;
    margin-bottom: 11px;
    position: relative; overflow: hidden;
  }
  .word-card::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(255,255,255,0.03) 6px,rgba(255,255,255,0.03) 12px);
  }
  .word-main {
    font-family: 'Gaegu', cursive;
    font-size: 40px; font-weight: 700;
    color: var(--warn);
    line-height: 1;
    position: relative;
  }
  .word-note {
    font-size: 11px;
    color: rgba(255,255,255,0.38);
    margin-top: 5px;
    position: relative;
  }

  /* 타이머 */
  .timer-bg { background: var(--line); border-radius: 4px; height: 8px; border: 1.5px solid var(--ink); overflow: hidden; }
  .timer-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 1s linear, background .3s; }
  .timer-fill.hot { background: var(--accent); }
  .timer-label { font-size: 12px; font-weight: 700; text-align: right; margin-top: 3px; }

  /* 플레이어 */
  .player-list { display: flex; flex-direction: column; gap: 7px; }
  .player {
    display: flex; align-items: center; gap: 8px;
    border: 1.5px solid var(--line); border-radius: 8px; padding: 8px 10px;
    transition: all .2s;
  }
  .player.is-drawing { border-color: var(--accent); background: #fff4f4; }
  .player.is-guessed { border-color: var(--green);  background: #f0faf8; }
  .p-avatar {
    width: 32px; height: 32px; border-radius: 7px; border: 2px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .p-name  { font-size: 13px; font-weight: 700; }
  .p-score { font-size: 11px; color: var(--blue); }
  .p-badge {
    margin-left: auto; font-size: 10px; padding: 2px 6px;
    border-radius: 999px; font-weight: 700;
  }
  .p-badge.drawing { background: var(--accent); color: white; }
  .p-badge.guessed { background: var(--green);  color: white; }

  /* 라운드 & 버튼 */
  .round-box {
    text-align: center; padding: 9px;
    background: var(--paper); border-radius: 8px;
    border: 1.5px solid var(--line); margin-bottom: 10px;
  }
  .round-n { font-family: 'Gaegu', cursive; font-size: 28px; font-weight: 700; line-height: 1; }
  .round-of { font-size: 11px; color: rgba(26,26,46,.45); }

  .btn {
    display: block; width: 100%; padding: 10px;
    border: 2px solid var(--ink); border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; margin-bottom: 7px;
    box-shadow: 0 3px 0 var(--ink); transition: all .15s;
  }
  .btn:active { transform: translateY(3px); box-shadow: none; }
  .btn-red  { background: var(--accent); color: white; }
  .btn-red:hover { background: #c62828; }
  .btn-plain { background: var(--bg); color: var(--ink); }
  .btn-plain:hover { background: var(--paper); }

  /* ── 캔버스 영역 ── */
  .canvas-wrap {
    background: var(--bg);
    border: 2px solid var(--ink);
    border-radius: 12px;
    box-shadow: 0 4px 0 var(--ink);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .toolbar {
    background: var(--ink);
    padding: 9px 13px;
    display: flex; align-items: center; gap: 9px; flex-wrap: wrap;
  }
  .sep { width: 1px; height: 22px; background: rgba(255,255,255,.2); }

  .c-btn {
    width: 21px; height: 21px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.3);
    cursor: pointer; flex-shrink: 0; transition: transform .1s, border-color .1s;
  }
  .c-btn.on { border-color: white; transform: scale(1.25); box-shadow: 0 0 0 2px rgba(255,255,255,.4); }

  .s-btn {
    background: rgba(255,255,255,.1); border: 1.5px solid rgba(255,255,255,.25);
    border-radius: 6px; padding: 4px 8px; color: white;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: background .1s;
  }
  .s-btn.on, .s-btn:hover { background: rgba(255,255,255,.28); }

  .t-btn {
    background: rgba(255,255,255,.1); border: 1.5px solid rgba(255,255,255,.25);
    border-radius: 6px; padding: 5px 10px; color: white;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: background .1s;
  }
  .t-btn:hover { background: rgba(255,255,255,.2); }
  .t-btn.eraser.on { background: rgba(255,200,100,.3); border-color: var(--warn); }

  canvas { display: block; cursor: crosshair; touch-action: none; width: 100%; }

  /* 채팅 */
  .chat {
    height: 180px; overflow-y: auto;
    padding: 9px 13px;
    display: flex; flex-direction: column; gap: 5px;
    border-top: 2px solid var(--ink);
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
  .m { font-size: 13px; line-height: 1.5; }
  .m.sys  { color: var(--blue); font-style: italic; font-size: 12px; }
  .m.ok   { color: var(--green); font-weight: 700; }
  .m.no   { color: var(--accent); }
  .m.txt  { color: var(--ink); }
  .mname  { font-weight: 700; margin-right: 4px; }

  .guess-row { border-top: 2px solid var(--ink); display: flex; }
  .guess-in {
    flex: 1; border: none; padding: 11px 13px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px;
    background: transparent; outline: none;
  }
  .guess-go {
    background: var(--accent); color: white; border: none;
    padding: 11px 18px; font-family: 'Gaegu', cursive;
    font-size: 17px; font-weight: 700; cursor: pointer; transition: background .15s;
  }
  .guess-go:hover { background: #c62828; }

  /* 오버레이 */
  .overlay {
    position: fixed; inset: 0; background: rgba(26,26,46,.72);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(3px);
  }
  .overlay.hide { display: none; }
  .ov-card {
    background: var(--bg); border: 3px solid var(--ink); border-radius: 16px;
    padding: 30px 28px; text-align: center; max-width: 340px; width: 90%;
    box-shadow: 7px 7px 0 var(--ink);
    animation: pop .3s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .ov-title { font-family: 'Gaegu', cursive; font-size: 34px; font-weight: 700; margin-bottom: 4px; }
  .ov-word  { font-family: 'Gaegu', cursive; font-size: 50px; color: var(--accent); margin: 6px 0; }
  .ov-sub   { font-size: 13px; color: rgba(26,26,46,.6); margin-bottom: 18px; line-height: 1.7; white-space: pre-line; }

  /* 색종이 */
  .conf-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden; }
  .conf { position: absolute; animation: fall linear forwards; }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 650px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ── 로비 ── */
  #lobby {
    position: fixed; inset: 0; z-index: 200;
    background: var(--paper);
    background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,200,220,0.17) 27px, rgba(180,200,220,0.17) 28px);
    display: flex; align-items: center; justify-content: center;
  }
  #lobby.hide { display: none; }
  .lobby-card {
    background: var(--bg); border: 3px solid var(--ink); border-radius: 16px;
    padding: 32px 28px; width: 100%; max-width: 420px;
    box-shadow: 7px 7px 0 var(--ink);
    animation: pop .35s cubic-bezier(.34,1.56,.64,1);
  }
  .lobby-title { font-family: 'Gaegu', cursive; font-size: 38px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .lobby-title em { color: var(--warn); font-style: normal; }
  .lobby-sub { text-align: center; font-size: 13px; color: rgba(26,26,46,.5); margin-bottom: 22px; }
  .player-inputs { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; }
  .player-row { display: flex; align-items: center; gap: 9px; }
  .p-row-emoji { font-size: 22px; width: 36px; text-align: center; flex-shrink: 0; }
  .player-row input {
    flex: 1; border: 2px solid var(--line); border-radius: 8px;
    padding: 9px 12px; font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; outline: none; transition: border-color .15s; background: var(--paper);
  }
  .player-row input:focus { border-color: var(--ink); background: white; }
  .player-row input::placeholder { color: rgba(26,26,46,.3); }
  .rm-btn {
    width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--line);
    background: transparent; color: rgba(26,26,46,.4); font-size: 14px;
    cursor: pointer; flex-shrink: 0; transition: all .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .rm-btn:hover { border-color: var(--accent); color: var(--accent); background: #fff4f4; }
  .add-btn {
    width: 100%; padding: 9px; border: 2px dashed var(--line); border-radius: 8px;
    background: transparent; font-size: 13px; color: rgba(26,26,46,.45);
    cursor: pointer; transition: all .15s; margin-bottom: 6px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .add-btn:hover { border-color: var(--ink); color: var(--ink); background: var(--paper); }
  .lobby-note { font-size: 11px; color: rgba(26,26,46,.38); text-align: center; margin-bottom: 16px; }

  /* ── 글자 수 힌트 바 ── */
  .hint-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 7px; padding: 10px 14px;
    border-top: 2px solid var(--ink);
    background: var(--paper);
    min-height: 44px;
    flex-wrap: wrap;
  }
  .hint-bar.empty { display: none; }
  .hint-circle {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2.5px solid var(--ink);
    background: white;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Gaegu', cursive; font-size: 15px; font-weight: 700;
    color: var(--ink);
    transition: all .25s;
  }
  .hint-circle.filled {
    background: var(--ink); color: var(--warn);
  }
  .hint-label {
    font-size: 11px; color: rgba(26,26,46,.4);
    margin-left: 4px; white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <div class="logo">그림<em>쟁이</em> 🎨</div>
  <div class="header-right">한국어 그림 맞추기</div>
</header>

<div class="layout">

  <!-- 사이드바 -->
  <div class="sidebar">

    <div class="box">
      <div class="box-head">✏️ 이번 단어</div>
      <div class="box-body">
        <div class="word-card">
          <div class="word-main" id="wordMain">?</div>
          <div class="word-note" id="wordNote">라운드를 시작하세요</div>
        </div>
        <div class="timer-bg"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
        <div class="timer-label" id="timerLabel">60초</div>
      </div>
    </div>

    <div class="box">
      <div class="box-head">👥 플레이어</div>
      <div class="box-body">
        <div class="player-list" id="playerList"></div>
      </div>
    </div>

    <div class="box">
      <div class="box-head">🎮 게임</div>
      <div class="box-body">
        <div class="round-box">
          <div class="round-n" id="roundN">1</div>
          <div class="round-of">/ <span id="totalR">5</span> 라운드</div>
        </div>
        <button class="btn btn-red"   onclick="startRound()">▶ 라운드 시작</button>
        <button class="btn btn-plain" onclick="skipWord()">↻ 단어 건너뛰기</button>
      </div>
    </div>

  </div>

  <!-- 캔버스 -->
  <div class="canvas-wrap">
    <div class="toolbar">
      <div id="colorPicker" style="display:flex;gap:6px;align-items:center;"></div>
      <div class="sep"></div>
      <button class="s-btn on" onclick="setSize(4,this)">S</button>
      <button class="s-btn"    onclick="setSize(11,this)">M</button>
      <button class="s-btn"    onclick="setSize(24,this)">L</button>
      <div class="sep"></div>
      <button class="t-btn eraser" id="eraserBtn" onclick="toggleEraser()">⬜ 지우개</button>
      <button class="t-btn"        onclick="clearCanvas()">🗑 전체 지우기</button>
    </div>
    <canvas id="c"></canvas>
    <div class="chat" id="chat"></div>
    <div class="hint-bar empty" id="hintBar"></div>
    <div class="guess-row">
      <input class="guess-in" id="guessIn" placeholder="한국어로 정답을 입력하세요..." autocomplete="off">
      <button class="guess-go" onclick="submitGuess()">맞춰!</button>
    </div>
  </div>
</div>

<div class="conf-wrap" id="confWrap"></div>

<!-- 라운드 종료 오버레이 -->
<div class="overlay hide" id="overlay">
  <div class="ov-card">
    <div class="ov-title" id="ovTitle"></div>
    <div class="ov-word"  id="ovWord"></div>
    <div class="ov-sub"   id="ovSub"></div>
    <button class="btn btn-red" onclick="closeOverlay()" style="margin-bottom:0;">다음 라운드 →</button>
  </div>
</div>

<!-- 게임 종료 오버레이 -->
<div class="overlay hide" id="endOverlay">
  <div class="ov-card" style="max-width:400px;">
    <div style="font-size:48px;margin-bottom:6px;">🏆</div>
    <div class="ov-title">게임 종료!</div>
    <div id="winnerName" style="font-family:'Gaegu',cursive;font-size:36px;color:var(--warn);margin:8px 0;"></div>
    <div id="winnerMsg"  style="font-size:13px;color:rgba(26,26,46,.55);margin-bottom:14px;line-height:1.7;"></div>
    <div id="finalScores" style="display:flex;flex-direction:column;gap:7px;margin-bottom:18px;text-align:left;width:100%;"></div>
    <button class="btn btn-red" onclick="resetGame()" style="margin-bottom:0;">🔄 다시 하기</button>
  </div>
</div>

<!-- 로비 -->
<div id="lobby">
  <div class="lobby-card">
    <div class="lobby-title">그림<em>쟁이</em> 🎨</div>
    <div class="lobby-sub">플레이어 이름을 입력하고 게임을 시작하세요!</div>
    <div class="player-inputs" id="playerInputs"></div>
    <button class="add-btn" onclick="addPlayerInput()">+ 플레이어 추가 (최대 5명)</button>
    <div class="lobby-note">2명 이상이어야 시작할 수 있어요</div>
    <button class="btn btn-red" onclick="startLobby()" style="margin-bottom:0;">게임 시작 ▶</button>
  </div>
</div>

<script>
const WORDS = [
  { kr:'밥',    note:'' },
  { kr:'떡',    note:'' },
  { kr:'밤',    note:'🌰 먹는 밤' },
  { kr:'배',    note:'' },
  { kr:'전',    note:'' },
  { kr:'곶감',  note:'' },
  { kr:'닭고기',note:'' },
  { kr:'사과',  note:'' },
  { kr:'생선',  note:'' },
  { kr:'국수',  note:'' },

  { kr:'형',    note:'' },
  { kr:'동생',  note:'' },
  { kr:'제비',  note:'' },
  { kr:'집',    note:'' },
  { kr:'둥지',  note:'' },
  { kr:'지붕',  note:'' },
  { kr:'봄',    note:'' },
  { kr:'여름',  note:'' },
  { kr:'가을',  note:'' },
  { kr:'겨울',  note:'' },
  { kr:'박',    note:'' },
  { kr:'씨',    note:'' },
  { kr:'꽃',    note:'' },
  { kr:'그릇',  note:'' },
  { kr:'책',    note:'' },
  { kr:'주걱',  note:'' },
  { kr:'이불',  note:'' },
];

const COLORS = ['#1a1a2e','#e63946','#457b9d','#2a9d8f','#f4a261','#e9c46a','#a8dadc','#264653','#ffffff'];
const PEMOJI = ['🐶','🐱','🦊','🐼','🐸'];
const PCOLOR = ['#e63946','#457b9d','#2a9d8f','#f4a261','#9b59b6'];

let g = {
  word: null,
  usedIdx: [],
  round: 1,
  totalRounds: 5,
  sec: 60,
  timer: null,
  running: false,
  drawerIdx: 0,
  color: '#1a1a2e',
  size: 4,
  erasing: false,
  drawing: false,
  lx: 0, ly: 0,
  players: [], // 로비에서 설정됨
};

/* ── 캔버스 ── */
const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');

function resize() {
  const w = cv.parentElement.clientWidth;
  const h = Math.max(320, window.innerHeight - 320);
  // 캔버스가 초기화 전(크기 0)이면 이미지 저장 건너뜀
  const hasContent = cv.width > 0 && cv.height > 0;
  const img = hasContent ? ctx.getImageData(0, 0, cv.width, cv.height) : null;
  cv.width = w; cv.height = h;
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h);
  if(img) ctx.putImageData(img, 0, 0);
}
window.addEventListener('resize', resize);
setTimeout(resize, 60);

function pos(e) {
  const r = cv.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return {
    x: (t.clientX - r.left) * (cv.width  / r.width),
    y: (t.clientY - r.top)  * (cv.height / r.height),
  };
}
cv.addEventListener('mousedown',  e => { g.drawing=true; const p=pos(e); g.lx=p.x; g.ly=p.y; });
cv.addEventListener('mousemove',  e => { if(!g.drawing) return; paint(pos(e)); });
cv.addEventListener('mouseup',    () => g.drawing=false);
cv.addEventListener('mouseleave', () => g.drawing=false);
cv.addEventListener('touchstart', e => { e.preventDefault(); g.drawing=true; const p=pos(e); g.lx=p.x; g.ly=p.y; }, {passive:false});
cv.addEventListener('touchmove',  e => { e.preventDefault(); if(!g.drawing) return; paint(pos(e)); }, {passive:false});
cv.addEventListener('touchend',   () => g.drawing=false);

function paint({x,y}) {
  ctx.beginPath(); ctx.moveTo(g.lx,g.ly); ctx.lineTo(x,y);
  ctx.strokeStyle = g.erasing ? '#fff' : g.color;
  ctx.lineWidth   = g.erasing ? g.size*3 : g.size;
  ctx.lineCap = ctx.lineJoin = 'round';
  ctx.stroke();
  g.lx=x; g.ly=y;
}
function clearCanvas() {
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height);
  msg('캔버스를 지웠어요.','sys');
}
function setSize(s,btn) {
  g.size=s;
  document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function toggleEraser() {
  g.erasing=!g.erasing;
  document.getElementById('eraserBtn').classList.toggle('on',g.erasing);
  cv.style.cursor = g.erasing ? 'cell' : 'crosshair';
}

/* ── 색상 ── */
(function buildColors() {
  const wrap = document.getElementById('colorPicker');
  COLORS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'c-btn' + (c===g.color ? ' on' : '');
    b.style.background = c;
    if(c==='#ffffff') b.style.border='2px solid rgba(255,255,255,0.45)';
    b.onclick = () => {
      g.color=c; g.erasing=false;
      document.getElementById('eraserBtn').classList.remove('on');
      cv.style.cursor='crosshair';
      document.querySelectorAll('.c-btn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
    };
    wrap.appendChild(b);
  });
})();

/* ── 플레이어 ── */
function buildPlayers() {
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  g.players.forEach((p,i) => {
    const div = document.createElement('div');
    div.className = 'player' + (i===g.drawerIdx ? ' is-drawing' : '') + (p.guessed ? ' is-guessed' : '');
    div.innerHTML = `
      <div class="p-avatar" style="background:${PCOLOR[i]}22;border-color:${PCOLOR[i]}">${PEMOJI[i]}</div>
      <div>
        <div class="p-name">${p.name}${p.isMe?' (나)':''}</div>
        <div class="p-score">${p.score}점</div>
      </div>
      ${i===g.drawerIdx ? '<span class="p-badge drawing">그리는 중</span>'
        : p.guessed     ? '<span class="p-badge guessed">정답!</span>' : ''}
    `;
    list.appendChild(div);
  });
}
buildPlayers();

/* ── 단어 뽑기 ── */
function pickWord() {
  const pool = WORDS.map((_,i)=>i).filter(i=>!g.usedIdx.includes(i));
  if(!pool.length) { g.usedIdx=[]; return pickWord(); }
  const idx = pool[Math.floor(Math.random()*pool.length)];
  g.usedIdx.push(idx);
  g.word = WORDS[idx];
  document.getElementById('wordMain').textContent = g.word.kr;
  document.getElementById('wordNote').textContent = g.word.note || '그리는 사람만 봐요 👀';
}

/* ── 타이머 ── */
function startTimer() {
  g.sec = 60;
  clearInterval(g.timer);
  g.timer = setInterval(() => {
    g.sec--;
    const pct = (g.sec/60)*100;
    document.getElementById('timerFill').style.width = pct+'%';
    document.getElementById('timerFill').classList.toggle('hot', g.sec<=15);
    document.getElementById('timerLabel').textContent = g.sec+'초';
    if(g.sec===20) msg('⏰ 20초 남았어요!','sys');
    if(g.sec<=0) { clearInterval(g.timer); timeUp(); }
  }, 1000);
}

function timeUp() {
  g.running = false;
  document.getElementById('hintBar').className = 'hint-bar empty';
  showOverlay('⏰ 시간 초과!', g.word?.kr||'', '다시 도전해 봐요!');
}

/* ── 게임 흐름 ── */
function startRound() {
  pickWord();
  clearCanvas();
  g.running = true;
  updateHintBar();
  g.players.forEach(p => p.guessed=false);
  buildPlayers();
  document.getElementById('overlay').classList.add('hide');
  startTimer();
  msg(`🎮 라운드 ${g.round} 시작! 그림을 보고 한국어로 맞춰 보세요!`, 'sys');
}

function skipWord() {
  if(!g.running) { msg('라운드를 먼저 시작해 주세요!','sys'); return; }
  pickWord();
  clearCanvas();
  updateHintBar();
  msg('단어를 건너뛰었어요.','sys');
}

/* ── 채팅 & 정답 ── */
function msg(text, type='txt', name='') {
  const area = document.getElementById('chat');
  const div  = document.createElement('div');
  div.className = 'm ' + type;
  div.innerHTML = name ? `<span class="mname">${name}</span>${text}` : text;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

document.getElementById('guessIn').addEventListener('keydown', e => {
  if(e.key==='Enter') submitGuess();
});

function submitGuess() {
  const inp   = document.getElementById('guessIn');
  const guess = inp.value.trim();
  if(!guess || !g.running) return;
  inp.value = '';

  msg(guess, 'txt', '나');
  if(!g.word) return;

  if(guess === g.word.kr) {
    clearInterval(g.timer);
    g.running = false;
    g.players[0].guessed = true;
    g.players[0].score  += Math.max(10, g.sec);
    buildPlayers();
    msg(`🎉 정답! +${Math.max(10,g.sec)}점`, 'ok');
    confetti();
    setTimeout(() => showOverlay('🎉 정답!', g.word.kr, `+${Math.max(10,g.sec)}점 획득!`), 500);
  } else {
    msg('❌ 아직 아니에요. 다시 봐요!', 'no');
  }
}

/* ── 오버레이 ── */
function showOverlay(title, word, sub) {
  document.getElementById('ovTitle').textContent = title;
  document.getElementById('ovWord').textContent  = word;
  document.getElementById('ovSub').textContent   = sub;
  document.getElementById('overlay').classList.remove('hide');
}
function closeOverlay() {
  document.getElementById('overlay').classList.add('hide');
  const nextRound = g.round + 1;
  if(nextRound > g.totalRounds) {
    // 모든 라운드 끝 → 최종 결과 화면
    setTimeout(showEndScreen, 300);
    return;
  }
  g.round = nextRound;
  document.getElementById('roundN').textContent = g.round;
  g.drawerIdx = (g.drawerIdx+1) % g.players.length;
  buildPlayers();
  g.running = false;
  document.getElementById('wordMain').textContent = '?';
  document.getElementById('wordNote').textContent = '라운드를 시작하세요';
  document.getElementById('timerFill').style.width = '100%';
  document.getElementById('timerLabel').textContent = '60초';
  document.getElementById('hintBar').className = 'hint-bar empty';
}

function showEndScreen() {
  // 점수 내림차순 정렬
  const sorted = [...g.players].sort((a,b) => b.score - a.score);
  const winner = sorted[0];
  const isTie  = sorted.length > 1 && sorted[0].score === sorted[1].score;

  document.getElementById('winnerName').textContent =
    isTie ? '🤝 동점!' : `${winner.name} 우승! ${PEMOJI[g.players.indexOf(winner)]}`;
  document.getElementById('winnerMsg').textContent =
    isTie
      ? `${sorted.filter(p=>p.score===winner.score).map(p=>p.name).join(', ')}이(가) ${winner.score}점으로 공동 우승!`
      : `${winner.score}점으로 최종 우승했어요! 🎊`;

  // 순위표
  const box = document.getElementById('finalScores');
  box.innerHTML = '';
  const medals = ['🥇','🥈','🥉'];
  sorted.forEach((p, i) => {
    const pi = g.players.indexOf(p);
    const row = document.createElement('div');
    row.style.cssText = `
      display:flex;align-items:center;gap:10px;
      padding:9px 12px;border-radius:9px;
      border:1.5px solid ${i===0?'#f4a261':'rgba(26,26,46,0.12)'};
      background:${i===0?'#fff8ee':'var(--paper)'};
    `;
    row.innerHTML = `
      <span style="font-size:20px;">${medals[i]||'  '}</span>
      <span style="font-size:18px;">${PEMOJI[pi]}</span>
      <span style="font-size:14px;font-weight:700;flex:1;">${p.name}</span>
      <span style="font-family:'Gaegu',cursive;font-size:20px;font-weight:700;color:${PCOLOR[pi]};">${p.score}점</span>
    `;
    box.appendChild(row);
  });

  confetti();
  document.getElementById('endOverlay').classList.remove('hide');
}

function resetGame() {
  document.getElementById('endOverlay').classList.add('hide');
  // 로비로 돌아가기
  g.round = 1; g.usedIdx = []; g.running = false; g.drawerIdx = 0; g.players = [];
  clearCanvas(); clearInterval(g.timer);
  document.getElementById('roundN').textContent    = '1';
  document.getElementById('wordMain').textContent  = '?';
  document.getElementById('wordNote').textContent  = '라운드를 시작하세요';
  document.getElementById('timerFill').style.width = '100%';
  document.getElementById('timerLabel').textContent= '60초';
  document.getElementById('chat').innerHTML        = '';
  buildPlayers();
  buildLobbyInputs();
  document.getElementById('lobby').classList.remove('hide');
}

/* ── 색종이 ── */
function confetti() {
  const wrap   = document.getElementById('confWrap');
  const colors = ['#e63946','#f4a261','#2a9d8f','#457b9d','#e9c46a','#a8dadc'];
  for(let i=0;i<55;i++) {
    const el = document.createElement('div');
    el.className = 'conf';
    const sz = 7 + Math.random()*9;
    el.style.cssText = `
      left:${Math.random()*100}vw;
      width:${sz}px; height:${sz}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${1.4+Math.random()*1.8}s;
      animation-delay:${Math.random()*.4}s;
    `;
    wrap.appendChild(el);
    setTimeout(()=>el.remove(), 3200);
  }
}

/* ── 로비 초기화 ── */
const DEFAULT_NAMES = ['', '', ''];

function buildLobbyInputs() {
  const wrap = document.getElementById('playerInputs');
  wrap.innerHTML = '';
  const names = g._lobbyNames || DEFAULT_NAMES.slice();
  names.forEach((n, i) => addPlayerRow(n, i));
}

function addPlayerRow(name='', idx) {
  const wrap = document.getElementById('playerInputs');
  const i = idx !== undefined ? idx : wrap.children.length;
  const row = document.createElement('div');
  row.className = 'player-row';
  row.innerHTML = `
    <span class="p-row-emoji">${PEMOJI[i % 5]}</span>
    <input type="text" maxlength="10"
      placeholder="${i===0?'내 닉네임':'플레이어 '+(i+1)+' 닉네임'}"
      value="${name}"
      style="border-left: 3px solid ${PCOLOR[i % 5]};">
    ${i >= 2 ? `<button class="rm-btn" onclick="removePlayerRow(this)" title="삭제">✕</button>` : '<span style="width:28px;flex-shrink:0;"></span>'}
  `;
  wrap.appendChild(row);
}

function addPlayerInput() {
  const wrap = document.getElementById('playerInputs');
  if(wrap.children.length >= 5) return;
  addPlayerRow('', wrap.children.length);
}

function removePlayerRow(btn) {
  const wrap = document.getElementById('playerInputs');
  if(wrap.children.length <= 2) return;
  btn.closest('.player-row').remove();
  // 이모지/색 인덱스 재정렬
  [...wrap.children].forEach((row, i) => {
    row.querySelector('.p-row-emoji').textContent = PEMOJI[i % 5];
    row.querySelector('input').style.borderLeft = `3px solid ${PCOLOR[i % 5]}`;
    row.querySelector('input').placeholder = i===0 ? '내 닉네임' : `플레이어 ${i+1} 닉네임`;
    const rm = row.querySelector('.rm-btn');
    if(i < 2 && rm) rm.remove();
  });
}

function startLobby() {
  const inputs = [...document.querySelectorAll('#playerInputs input')];
  const names = inputs.map((el,i) => el.value.trim() || `플레이어${i+1}`);
  if(names.length < 2) { alert('2명 이상 필요해요!'); return; }
  g.players = names.map((name, i) => ({
    name, score:0, guessed:false, isMe: i===0
  }));
  document.getElementById('lobby').classList.add('hide');
  buildPlayers();
  msg('👋 환영해요! "라운드 시작"을 누르면 단어가 나와요.', 'sys');
  msg('🎨 그리는 사람만 단어를 보고, 나머지는 채팅으로 맞춰요!', 'sys');
  resize();
}

/* ── 글자 수 힌트 ── */
function updateHintBar() {
  const bar = document.getElementById('hintBar');
  if(!g.word || !g.running) { bar.className = 'hint-bar empty'; return; }
  const len = [...g.word.kr].length; // 유니코드 글자 수
  bar.className = 'hint-bar';
  bar.innerHTML =
    [...g.word.kr].map(() =>
      `<div class="hint-circle"></div>`
    ).join('') +
    `<span class="hint-label">${len}글자</span>`;
}

buildLobbyInputs();
</script>
</body>
</html>
