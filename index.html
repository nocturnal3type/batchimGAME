<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그림쟁이 🎨</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --ink:#1a1a2e; --paper:#faf7f0; --accent:#e63946;
    --green:#2a9d8f; --blue:#457b9d; --warn:#f4a261;
    --line:rgba(26,26,46,0.13); --bg:#ffffff;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Noto Sans KR',sans-serif;
    background:var(--paper);
    background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(180,200,220,0.17) 27px,rgba(180,200,220,0.17) 28px);
    min-height:100vh; color:var(--ink);
  }
  header {
    background:var(--ink); padding:11px 20px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:3px solid var(--accent);
  }
  .logo { font-family:'Gaegu',cursive; font-size:24px; font-weight:700; color:white; }
  .logo em { color:var(--warn); font-style:normal; }
  .room-badge { font-size:13px; color:rgba(255,255,255,0.7); background:rgba(255,255,255,0.1); border-radius:6px; padding:4px 10px; letter-spacing:0.05em; }
  .room-badge span { color:white; font-weight:700; letter-spacing:0.12em; }

  .layout { display:grid; grid-template-columns:200px 1fr; gap:14px; max-width:900px; margin:0 auto; padding:14px; align-items:start; }
  .sidebar > * { margin-bottom:12px; }
  .box { background:var(--bg); border:2px solid var(--ink); border-radius:12px; box-shadow:0 4px 0 var(--ink); overflow:hidden; }
  .box-head { background:var(--ink); color:white; padding:8px 13px; font-size:12px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
  .box-body { padding:13px; }

  .word-card { background:var(--ink); border-radius:8px; padding:16px 10px; text-align:center; margin-bottom:11px; position:relative; overflow:hidden; }
  .word-card::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(255,255,255,0.03) 6px,rgba(255,255,255,0.03) 12px); }
  .word-main { font-family:'Gaegu',cursive; font-size:40px; font-weight:700; color:var(--warn); line-height:1; position:relative; }
  .word-note { font-size:11px; color:rgba(255,255,255,0.38); margin-top:5px; position:relative; }

  .timer-bg { background:var(--line); border-radius:4px; height:8px; border:1.5px solid var(--ink); overflow:hidden; }
  .timer-fill { height:100%; background:var(--green); border-radius:2px; transition:width 1s linear,background .3s; }
  .timer-fill.hot { background:var(--accent); }
  .timer-label { font-size:12px; font-weight:700; text-align:right; margin-top:3px; }

  .player-list { display:flex; flex-direction:column; gap:7px; }
  .player { display:flex; align-items:center; gap:8px; border:1.5px solid var(--line); border-radius:8px; padding:8px 10px; transition:all .2s; }
  .player.is-drawing { border-color:var(--accent); background:#fff4f4; }
  .player.is-guessed { border-color:var(--green); background:#f0faf8; }
  .player.is-me { border-style:dashed; }
  .p-avatar { width:32px; height:32px; border-radius:7px; border:2px solid var(--ink); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .p-name { font-size:13px; font-weight:700; }
  .p-score { font-size:11px; color:var(--blue); }
  .p-badge { margin-left:auto; font-size:10px; padding:2px 6px; border-radius:999px; font-weight:700; }
  .p-badge.drawing { background:var(--accent); color:white; }
  .p-badge.guessed { background:var(--green); color:white; }

  .btn { display:block; width:100%; padding:10px; border:2px solid var(--ink); border-radius:8px; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; cursor:pointer; margin-bottom:7px; box-shadow:0 3px 0 var(--ink); transition:all .15s; }
  .btn:active { transform:translateY(3px); box-shadow:none; }
  .btn-red { background:var(--accent); color:white; }
  .btn-red:hover { background:#c62828; }
  .btn-plain { background:var(--bg); color:var(--ink); }
  .btn-plain:hover { background:var(--paper); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:0 3px 0 var(--ink); }

  .round-box { text-align:center; padding:9px; background:var(--paper); border-radius:8px; border:1.5px solid var(--line); margin-bottom:10px; }
  .round-n { font-family:'Gaegu',cursive; font-size:28px; font-weight:700; line-height:1; }
  .round-of { font-size:11px; color:rgba(26,26,46,.45); }

  .canvas-wrap { background:var(--bg); border:2px solid var(--ink); border-radius:12px; box-shadow:0 4px 0 var(--ink); display:flex; flex-direction:column; overflow:hidden; }
  .toolbar { background:var(--ink); padding:9px 13px; display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
  .sep { width:1px; height:22px; background:rgba(255,255,255,.2); }
  .c-btn { width:21px; height:21px; border-radius:50%; border:2px solid rgba(255,255,255,.3); cursor:pointer; flex-shrink:0; transition:transform .1s,border-color .1s; }
  .c-btn.on { border-color:white; transform:scale(1.25); box-shadow:0 0 0 2px rgba(255,255,255,.4); }
  .s-btn { background:rgba(255,255,255,.1); border:1.5px solid rgba(255,255,255,.25); border-radius:6px; padding:4px 8px; color:white; font-size:12px; font-weight:700; cursor:pointer; transition:background .1s; }
  .s-btn.on,.s-btn:hover { background:rgba(255,255,255,.28); }
  .t-btn { background:rgba(255,255,255,.1); border:1.5px solid rgba(255,255,255,.25); border-radius:6px; padding:5px 10px; color:white; font-size:12px; font-weight:700; cursor:pointer; transition:background .1s; }
  .t-btn:hover { background:rgba(255,255,255,.2); }
  .t-btn.eraser.on { background:rgba(255,200,100,.3); border-color:var(--warn); }
  .toolbar-disabled { opacity:0.35; pointer-events:none; }
  canvas { display:block; cursor:crosshair; touch-action:none; width:100%; }
  canvas.locked { cursor:not-allowed; }

  .chat { height:180px; overflow-y:auto; padding:9px 13px; display:flex; flex-direction:column; gap:5px; border-top:2px solid var(--ink); scroll-behavior:smooth; }
  .chat::-webkit-scrollbar { width:4px; }
  .chat::-webkit-scrollbar-thumb { background:var(--line); border-radius:2px; }
  .m { font-size:13px; line-height:1.5; }
  .m.sys { color:var(--blue); font-style:italic; font-size:12px; }
  .m.ok  { color:var(--green); font-weight:700; }
  .m.no  { color:var(--accent); }
  .m.txt { color:var(--ink); }
  .mname { font-weight:700; margin-right:4px; }

  .hint-bar { display:flex; align-items:center; justify-content:center; gap:7px; padding:10px 14px; border-top:2px solid var(--ink); background:var(--paper); min-height:44px; flex-wrap:wrap; }
  .hint-bar.empty { display:none; }
  .hint-circle { width:28px; height:28px; border-radius:50%; border:2.5px solid var(--ink); background:white; display:flex; align-items:center; justify-content:center; font-family:'Gaegu',cursive; font-size:15px; font-weight:700; }
  .hint-label { font-size:11px; color:rgba(26,26,46,.4); margin-left:4px; white-space:nowrap; }

  .guess-row { border-top:2px solid var(--ink); display:flex; }
  .guess-in { flex:1; border:none; padding:11px 13px; font-family:'Noto Sans KR',sans-serif; font-size:14px; background:transparent; outline:none; }
  .guess-go { background:var(--accent); color:white; border:none; padding:11px 18px; font-family:'Gaegu',cursive; font-size:17px; font-weight:700; cursor:pointer; transition:background .15s; }
  .guess-go:hover { background:#c62828; }
  .guess-go:disabled { opacity:0.4; cursor:not-allowed; }

  .overlay { position:fixed; inset:0; background:rgba(26,26,46,.72); display:flex; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(3px); }
  .overlay.hide { display:none; }
  .ov-card { background:var(--bg); border:3px solid var(--ink); border-radius:16px; padding:30px 28px; text-align:center; max-width:380px; width:90%; box-shadow:7px 7px 0 var(--ink); animation:pop .3s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
  .ov-title { font-family:'Gaegu',cursive; font-size:34px; font-weight:700; margin-bottom:4px; }
  .ov-word  { font-family:'Gaegu',cursive; font-size:50px; color:var(--accent); margin:6px 0; }
  .ov-sub   { font-size:13px; color:rgba(26,26,46,.6); margin-bottom:18px; line-height:1.7; white-space:pre-line; }

  .conf-wrap { position:fixed; inset:0; pointer-events:none; z-index:99; overflow:hidden; }
  .conf { position:absolute; animation:fall linear forwards; }
  @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

  /* 로비 */
  #screen-lobby { position:fixed; inset:0; z-index:200; background:var(--paper); background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(180,200,220,0.17) 27px,rgba(180,200,220,0.17) 28px); display:flex; align-items:center; justify-content:center; padding:16px; }
  #screen-lobby.hide { display:none; }
  .lobby-wrap { display:flex; gap:16px; max-width:700px; width:100%; flex-wrap:wrap; justify-content:center; }
  .lobby-card { background:var(--bg); border:3px solid var(--ink); border-radius:16px; padding:28px 24px; flex:1; min-width:280px; max-width:320px; box-shadow:6px 6px 0 var(--ink); animation:pop .35s cubic-bezier(.34,1.56,.64,1); }
  .lobby-title { font-family:'Gaegu',cursive; font-size:32px; font-weight:700; text-align:center; margin-bottom:4px; }
  .lobby-title em { color:var(--warn); font-style:normal; }
  .lobby-sub { text-align:center; font-size:12px; color:rgba(26,26,46,.5); margin-bottom:18px; }
  .lobby-divider { text-align:center; font-size:11px; color:rgba(26,26,46,.35); margin:10px 0; }
  .lbl { font-size:12px; font-weight:700; color:rgba(26,26,46,.6); margin-bottom:5px; }
  .txt-in { width:100%; border:2px solid var(--line); border-radius:8px; padding:9px 12px; font-family:'Noto Sans KR',sans-serif; font-size:14px; outline:none; transition:border-color .15s; background:var(--paper); margin-bottom:10px; }
  .txt-in:focus { border-color:var(--ink); background:white; }
  .room-code-display { font-family:'Gaegu',cursive; font-size:36px; font-weight:700; letter-spacing:8px; text-align:center; color:var(--ink); background:var(--paper); border:2px dashed var(--line); border-radius:8px; padding:10px; margin-bottom:6px; cursor:pointer; transition:background .15s; }
  .room-code-display:hover { background:#f0ece0; }
  .copy-hint { font-size:11px; color:rgba(26,26,46,.4); text-align:center; margin-bottom:12px; }
  .waiting-list { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; min-height:48px; }
  .w-player { display:flex; align-items:center; gap:8px; border:1.5px solid var(--line); border-radius:8px; padding:7px 10px; font-size:13px; font-weight:700; }
  .w-host-badge { font-size:10px; background:var(--accent); color:white; border-radius:999px; padding:1px 6px; margin-left:auto; }
  .error-msg { font-size:12px; color:var(--accent); text-align:center; margin-top:-6px; margin-bottom:8px; min-height:18px; }

  @media (max-width:650px) { .layout { grid-template-columns:1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo">그림<em>쟁이</em> 🎨</div>
  <div class="room-badge" id="headerRoom" style="display:none">방 코드: <span id="headerRoomCode"></span></div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="box">
      <div class="box-head">✏️ 이번 단어</div>
      <div class="box-body">
        <div class="word-card">
          <div class="word-main" id="wordMain">?</div>
          <div class="word-note" id="wordNote">게임을 기다리는 중...</div>
        </div>
        <div class="timer-bg"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
        <div class="timer-label" id="timerLabel">60초</div>
      </div>
    </div>
    <div class="box">
      <div class="box-head">👥 플레이어</div>
      <div class="box-body"><div class="player-list" id="playerList"></div></div>
    </div>
    <div class="box">
      <div class="box-head">🎮 게임</div>
      <div class="box-body">
        <div class="round-box">
          <div class="round-n" id="roundN">1</div>
          <div class="round-of">/ <span id="totalR">5</span> 라운드</div>
        </div>
        <button class="btn btn-red"   id="startBtn"  onclick="hostAction('startGame')">▶ 게임 시작</button>
        <button class="btn btn-plain" id="skipBtn"   onclick="drawerAction('skip')" disabled>↻ 단어 건너뛰기</button>
        <button class="btn btn-plain" id="nextBtn"   onclick="hostAction('nextRound')" style="display:none">다음 라운드 →</button>
      </div>
    </div>
  </div>

  <div class="canvas-wrap">
    <div class="toolbar" id="toolbar">
      <div id="colorPicker" style="display:flex;gap:6px;align-items:center;"></div>
      <div class="sep"></div>
      <button class="s-btn on" onclick="setSize(4,this)">S</button>
      <button class="s-btn"    onclick="setSize(11,this)">M</button>
      <button class="s-btn"    onclick="setSize(24,this)">L</button>
      <div class="sep"></div>
      <button class="t-btn eraser" id="eraserBtn" onclick="toggleEraser()">⬜ 지우개</button>
      <button class="t-btn"        onclick="doClean()">🗑 전체 지우기</button>
    </div>
    <canvas id="c"></canvas>
    <div class="chat" id="chat"></div>
    <div class="hint-bar empty" id="hintBar"></div>
    <div class="guess-row">
      <input class="guess-in" id="guessIn" placeholder="한국어로 정답을 입력하세요..." autocomplete="off">
      <button class="guess-go" id="guessGo" onclick="submitGuess()">맞춰!</button>
    </div>
  </div>
</div>

<div class="conf-wrap" id="confWrap"></div>

<div class="overlay hide" id="ovRound">
  <div class="ov-card">
    <div class="ov-title" id="ovRoundTitle"></div>
    <div class="ov-word"  id="ovRoundWord"></div>
    <div class="ov-sub"   id="ovRoundSub"></div>
    <button class="btn btn-red" id="ovNextBtn" onclick="hostAction('nextRound')" style="margin-bottom:0;">다음 라운드 →</button>
  </div>
</div>

<div class="overlay hide" id="ovEnd">
  <div class="ov-card" style="max-width:400px;">
    <div style="font-size:48px;margin-bottom:6px;">🏆</div>
    <div class="ov-title">게임 종료!</div>
    <div id="winnerName" style="font-family:'Gaegu',cursive;font-size:34px;color:var(--warn);margin:6px 0;"></div>
    <div id="winnerMsg"  style="font-size:13px;color:rgba(26,26,46,.55);margin-bottom:12px;line-height:1.7;"></div>
    <div id="finalScores" style="display:flex;flex-direction:column;gap:7px;margin-bottom:16px;text-align:left;width:100%;"></div>
    <button class="btn btn-red" onclick="hostAction('resetGame')" style="margin-bottom:0;">🔄 다시 하기</button>
  </div>
</div>

<!-- 로비 -->
<div id="screen-lobby">
  <div class="lobby-wrap">
    <div class="lobby-card">
      <div class="lobby-title">그림<em>쟁이</em> 🎨</div>
      <div class="lobby-sub">새 방을 만들거나, 코드로 입장하세요</div>
      <div class="lbl">내 닉네임</div>
      <input class="txt-in" id="nameCreate" placeholder="닉네임을 입력하세요" maxlength="10">
      <button class="btn btn-red" onclick="createRoom()" style="margin-bottom:4px;">✚ 새 방 만들기</button>
      <div class="error-msg" id="errCreate"></div>
      <div class="lobby-divider">── 또는 ──</div>
      <div class="lbl">방 코드로 입장</div>
      <input class="txt-in" id="codeJoin" placeholder="6자리 코드 입력" maxlength="6" style="text-transform:uppercase;letter-spacing:4px;font-weight:700;font-size:16px;">
      <input class="txt-in" id="nameJoin" placeholder="닉네임을 입력하세요" maxlength="10">
      <button class="btn btn-plain" onclick="joinRoom()">→ 입장하기</button>
      <div class="error-msg" id="errJoin"></div>
    </div>

    <div class="lobby-card hide" id="waitingRoom">
      <div class="lobby-title" style="font-size:24px;margin-bottom:2px;">대기실</div>
      <div class="lobby-sub" style="margin-bottom:12px;">친구에게 코드를 알려주세요!</div>
      <div class="room-code-display" id="roomCodeDisplay" onclick="copyCode()"></div>
      <div class="copy-hint">클릭하면 코드가 복사돼요 📋</div>
      <div class="lbl">참가자 (<span id="playerCount">0</span>명)</div>
      <div class="waiting-list" id="waitingList"></div>
      <button class="btn btn-red" id="hostStartBtn" onclick="hostAction('startGame')" disabled>▶ 게임 시작</button>
      <div style="font-size:11px;color:rgba(26,26,46,.4);text-align:center;">2명 이상이어야 시작 가능</div>
    </div>
  </div>
</div>

<script>
// ── Supabase 설정 ─────────────────────────────────────────
const SUPABASE_URL = 'https://thkpumuajtwdtixietlh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3GSnfFxaX_rsB1Dc8Wb3NQ_bYhO9jaW'

const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── 상수 ──────────────────────────────────────────────────
const WORDS = [
  {kr:'밥',note:''},{kr:'떡',note:''},{kr:'밤',note:'🌰 먹는 밤'},
  {kr:'배',note:''},{kr:'전',note:''},{kr:'곶감',note:''},
  {kr:'닭고기',note:''},{kr:'사과',note:''},{kr:'생선',note:''},
  {kr:'국수',note:''},{kr:'형',note:''},{kr:'동생',note:''},
  {kr:'제비',note:''},{kr:'집',note:''},{kr:'둥지',note:''},
  {kr:'지붕',note:''},{kr:'봄',note:''},{kr:'여름',note:''},
  {kr:'가을',note:''},{kr:'겨울',note:''},{kr:'박',note:''},
  {kr:'씨',note:''},{kr:'꽃',note:''},{kr:'그릇',note:''},
  {kr:'책',note:''},{kr:'주걱',note:''},{kr:'이불',note:''},
];
const PEMOJI = ['🐶','🐱','🦊','🐼','🐸'];
const PCOLOR = ['#e63946','#457b9d','#2a9d8f','#f4a261','#9b59b6'];
const COLORS_PALETTE = ['#1a1a2e','#e63946','#457b9d','#2a9d8f','#f4a261','#e9c46a','#a8dadc','#264653','#ffffff'];

// ── 상태 ──────────────────────────────────────────────────
let myName = '';
let myId   = Math.random().toString(36).slice(2);
let roomCode = '';
let isHost = false;
let amDrawer = false;
let gamePhase = 'lobby';
let players = [];
let currentWordKr = '';
let timerInterval = null;
let channel = null;
let usedWordIdxs = [];
let drawerIdx = 0;
let round = 1;
let timerSec = 60;

// ── 방 코드 생성 ──────────────────────────────────────────
function makeRoomCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, () => c[Math.floor(Math.random()*c.length)]).join('');
}

// ── Supabase Realtime 채널 연결 ───────────────────────────
function connectChannel(code) {
  roomCode = code.toUpperCase();
  channel = sb.channel('room:' + roomCode, {
    config: { broadcast: { self: false } }
  });

  channel
    .on('broadcast', { event: 'game' }, ({ payload }) => handleMsg(payload))
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        document.getElementById('headerRoom').style.display = '';
        document.getElementById('headerRoomCode').textContent = roomCode;
        // ★ 자기 자신을 먼저 플레이어 목록에 추가 (self:false라 broadcast로 못 받으므로)
        if (!players.find(p => p.id === myId)) {
          players.push({ id: myId, name: myName, score: 0, guessed: false, isDrawer: false });
        }
        buildPlayers();
        updateWaitingRoom();
        // 다른 사람들에게 입장 알림
        broadcast({ type: 'join', id: myId, name: myName });
      }
    });
}

function broadcast(payload) {
  if (channel) channel.send({ type: 'broadcast', event: 'game', payload });
}

// ── 메시지 핸들러 ─────────────────────────────────────────
function handleMsg(data) {
  switch(data.type) {

    case 'join':
      if (!players.find(p => p.id === data.id)) {
        players.push({ id: data.id, name: data.name, score: 0, guessed: false, isDrawer: false });
      }
      buildPlayers();
      updateWaitingRoom();
      addMsg(`👋 ${data.name}님이 입장했어요!`, 'sys');
      // 방장이 현재 상태 새 플레이어에게 전달
      if (isHost && gamePhase !== 'lobby') {
        broadcast({ type: 'syncState', players, round, timerSec, gamePhase, drawerIdx, wordLen: [...currentWordKr].length });
      }
      break;

    case 'syncState':
      players   = data.players;
      round     = data.round;
      gamePhase = data.gamePhase;
      drawerIdx = data.drawerIdx;
      amDrawer  = players[drawerIdx]?.id === myId;
      document.getElementById('roundN').textContent = round;
      updateTimer(data.timerSec);
      buildPlayers();
      updateHintBar(data.wordLen);
      document.getElementById('screen-lobby').classList.add('hide');
      lockCanvas(!amDrawer);
      document.getElementById('guessIn').disabled  = amDrawer;
      document.getElementById('guessGo').disabled  = amDrawer;
      document.getElementById('skipBtn').disabled  = !amDrawer;
      document.getElementById('startBtn').style.display = 'none';
      break;

    case 'startGame':
      if (!isHost) {
        players.forEach(p => { p.score=0; p.guessed=false; });
        round = 1; drawerIdx = 0; usedWordIdxs = [];
      }
      document.getElementById('screen-lobby').classList.add('hide');
      document.getElementById('ovRound').classList.add('hide');
      document.getElementById('ovEnd').classList.add('hide');
      document.getElementById('startBtn').style.display = 'none';
      gamePhase = 'playing';
      if (isHost) startRoundHost();
      break;

    case 'roundStart':
      round     = data.round;
      drawerIdx = data.drawerIdx;
      players.forEach(p => p.guessed = false);
      players.forEach((p,i) => { p.isDrawer = i===drawerIdx; });
      // ★ id 기반으로 내가 그리는 사람인지 정확히 판단
      amDrawer = players[drawerIdx]?.id === myId;
      gamePhase = 'playing';
      document.getElementById('roundN').textContent = round;
      document.getElementById('ovRound').classList.add('hide');
      clearCanvasLocal();
      buildPlayers();
      // ★ 캔버스 잠금 / 해제
      lockCanvas(!amDrawer);
      document.getElementById('guessIn').disabled = amDrawer;
      document.getElementById('guessGo').disabled = amDrawer;
      document.getElementById('skipBtn').disabled = !amDrawer;
      document.getElementById('nextBtn').style.display = 'none';
      if (!amDrawer) {
        document.getElementById('wordMain').textContent = '?';
        document.getElementById('wordNote').textContent = '맞춰 보세요!';
        updateHintBar(data.wordLen);
      }
      // 타이머는 방장만 startRoundHost에서 직접 시작
      if (!isHost) startTimerLocal(data.timerSec || 60);
      addMsg(`🎮 라운드 ${round} 시작! 그리는 사람: ${players[drawerIdx]?.name}`, 'sys');
      break;

    case 'yourWord':
      if (data.targetId === myId) {
        currentWordKr = data.wordKr;
        document.getElementById('wordMain').textContent = data.wordKr;
        document.getElementById('wordNote').textContent = data.wordNote || '그리는 사람만 봐요 👀';
        updateHintBar();
      }
      break;

    case 'chat':
      addMsg(data.msg, data.kind || 'txt', data.name || '');
      break;

    case 'guess': {
      const p = players.find(x => x.id === data.id);
      if (!p) break;
      addMsg(data.text, 'txt', p.name);
      if (isHost) {
        if (data.text === currentWordKr) {
          p.guessed = true;
          const pts = Math.max(10, timerSec);
          p.score += pts;
          if (players[drawerIdx]) players[drawerIdx].score += 5;
          broadcast({ type:'chat', msg:`🎉 정답! +${pts}점`, kind:'ok', name:p.name });
          broadcast({ type:'correct' });
          broadcast({ type:'playerUpdate', players });
          const guessers = players.filter((_,i)=>i!==drawerIdx);
          if (guessers.every(x=>x.guessed)) endRoundHost();
        } else {
          broadcast({ type:'chat', msg:'❌ 아직 아니에요!', kind:'no', name:p.name });
        }
      }
      break;
    }

    case 'correct':
      confetti();
      break;

    case 'playerUpdate':
      players = data.players;
      buildPlayers();
      break;

    case 'draw':
      if (!amDrawer) remoteDraw(data);
      break;

    case 'clearCanvas':
      clearCanvasLocal();
      break;

    case 'nextRound':
      // 비방장 플레이어: 오버레이 닫고 대기
      document.getElementById('ovRound').classList.add('hide');
      break;

    case 'roundEnd':
      clearInterval(timerInterval);
      gamePhase = 'roundEnd';
      document.getElementById('ovRoundTitle').textContent = data.timeout ? '⏰ 시간 초과!' : '✅ 라운드 종료!';
      document.getElementById('ovRoundWord').textContent  = data.word;
      document.getElementById('ovRoundSub').textContent   = isHost ? '' : '방장이 다음 라운드를 시작할 거예요.';
      document.getElementById('ovNextBtn').style.display  = isHost ? '' : 'none';
      document.getElementById('ovRound').classList.remove('hide');
      document.getElementById('hintBar').className = 'hint-bar empty';
      break;

    case 'gameEnd':
      clearInterval(timerInterval);
      gamePhase = 'gameEnd';
      showGameEnd();
      break;

    case 'skip':
      if (isHost) startRoundHost(true);
      break;

    case 'resetGame':
      players.forEach(p => { p.score=0; p.guessed=false; p.isDrawer=false; });
      round=1; usedWordIdxs=[]; gamePhase='lobby';
      clearCanvasLocal(); clearInterval(timerInterval);
      document.getElementById('ovEnd').classList.add('hide');
      document.getElementById('ovRound').classList.add('hide');
      document.getElementById('wordMain').textContent = '?';
      document.getElementById('wordNote').textContent = '게임을 기다리는 중...';
      document.getElementById('timerFill').style.width='100%';
      document.getElementById('timerLabel').textContent='60초';
      document.getElementById('hintBar').className='hint-bar empty';
      document.getElementById('startBtn').style.display='';
      document.getElementById('screen-lobby').classList.remove('hide');
      document.getElementById('waitingRoom').classList.remove('hide');
      buildPlayers(); updateWaitingRoom();
      break;
  }
}

// ── 방장 전용 로직 ────────────────────────────────────────
function pickWord() {
  const pool = WORDS.map((_,i)=>i).filter(i=>!usedWordIdxs.includes(i));
  if (!pool.length) usedWordIdxs = [];
  const idx = (pool.length ? pool : WORDS.map((_,i)=>i))[Math.floor(Math.random()*(pool.length||WORDS.length))];
  usedWordIdxs.push(idx);
  return WORDS[idx];
}

function startRoundHost(isSkip = false) {
  if (!isSkip) {
    if (round > 1) drawerIdx = (drawerIdx + 1) % players.length;
  }
  players.forEach((p,i) => { p.isDrawer = i===drawerIdx; p.guessed=false; });
  const word = pickWord();
  currentWordKr = word.kr;
  timerSec = 60;

  broadcast({
    type: 'roundStart',
    round, drawerIdx,
    wordLen: [...word.kr].length,
    timerSec: 60,
  });
  // 비방장 플레이어에게 roundStart 전달
  // 방장도 직접 처리
  handleMsg({
    type: 'roundStart',
    round, drawerIdx,
    wordLen: [...word.kr].length,
    timerSec: 60,
  });

  // 그리는 사람에게 단어 전송
  const drawerPlayer = players[drawerIdx];
  if (drawerPlayer) {
    if (drawerPlayer.id === myId) {
      // 방장이 그리는 사람이면 직접 처리
      handleMsg({ type:'yourWord', targetId: myId, wordKr: word.kr, wordNote: word.note });
    } else {
      broadcast({ type:'yourWord', targetId: drawerPlayer.id, wordKr: word.kr, wordNote: word.note });
    }
  }

  startTimerLocal(60);
}

function endRoundHost(timeout = false) {
  clearInterval(timerInterval);
  broadcast({ type: 'roundEnd', word: currentWordKr, timeout });
}

function startTimerLocal(sec) {
  timerSec = sec;
  clearInterval(timerInterval);
  updateTimer(timerSec);
  timerInterval = setInterval(() => {
    timerSec--;
    updateTimer(timerSec);
    if (isHost && timerSec === 20) broadcast({ type:'chat', msg:'⏰ 20초 남았어요!', kind:'sys' });
    if (timerSec <= 0) {
      clearInterval(timerInterval);
      if (isHost) endRoundHost(true);
    }
  }, 1000);
}

function updateTimer(sec) {
  const pct = (sec/60)*100;
  document.getElementById('timerFill').style.width = pct+'%';
  document.getElementById('timerFill').classList.toggle('hot', sec<=15);
  document.getElementById('timerLabel').textContent = sec+'초';
}

// ── 버튼 액션 ─────────────────────────────────────────────
function hostAction(type) {
  if (!isHost) return;
  if (type === 'startGame') {
    players.forEach(p => { p.score=0; p.guessed=false; });
    round=1; drawerIdx=0; usedWordIdxs=[];
    broadcast({ type:'startGame' });
    // ★ 방장은 자신도 직접 처리 (self:false 이므로)
    handleMsg({ type:'startGame' });
  } else if (type === 'nextRound') {
    document.getElementById('ovRound').classList.add('hide');
    if (round >= 5) {
      broadcast({ type:'gameEnd' });
      handleMsg({ type:'gameEnd' });
    } else {
      round++;
      broadcast({ type:'nextRound' });
      handleMsg({ type:'nextRound' });
      startRoundHost();
    }
  } else if (type === 'resetGame') {
    broadcast({ type:'resetGame' });
    handleMsg({ type:'resetGame' });
  }
}

function drawerAction(type) {
  if (!amDrawer) return;
  if (type === 'skip') broadcast({ type:'skip' });
}

// ── 로비 ─────────────────────────────────────────────────
function createRoom() {
  const name = document.getElementById('nameCreate').value.trim();
  if (!name) { showError('errCreate','닉네임을 입력해 주세요!'); return; }
  myName = name; isHost = true;
  const code = makeRoomCode();
  document.getElementById('roomCodeDisplay').textContent = code;
  document.getElementById('waitingRoom').classList.remove('hide');
  connectChannel(code);
}

function joinRoom() {
  const code = document.getElementById('codeJoin').value.trim().toUpperCase();
  const name = document.getElementById('nameJoin').value.trim();
  if (!code || code.length!==6) { showError('errJoin','6자리 코드를 입력해 주세요!'); return; }
  if (!name) { showError('errJoin','닉네임을 입력해 주세요!'); return; }
  myName = name; isHost = false;
  document.getElementById('roomCodeDisplay').textContent = code;
  document.getElementById('waitingRoom').classList.remove('hide');
  connectChannel(code);
}

function updateWaitingRoom() {
  const list = document.getElementById('waitingList');
  list.innerHTML = '';
  players.forEach((p,i) => {
    const div = document.createElement('div');
    div.className = 'w-player';
    div.innerHTML = `<span>${PEMOJI[i%5]}</span><span>${p.name}</span>${i===0?'<span class="w-host-badge">방장</span>':''}`;
    list.appendChild(div);
  });
  document.getElementById('playerCount').textContent = players.length;
  document.getElementById('hostStartBtn').disabled = players.length < 2;
}

function copyCode() {
  const code = document.getElementById('roomCodeDisplay').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const el = document.getElementById('roomCodeDisplay');
    const orig = el.textContent;
    el.textContent = '복사됨!';
    setTimeout(()=>el.textContent=orig, 1200);
  });
}

function showError(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent=msg; setTimeout(()=>el.textContent='',3000); }
}

// ── 플레이어 목록 ─────────────────────────────────────────
function buildPlayers() {
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  players.forEach((p,i) => {
    const isMe = p.id === myId;
    const div = document.createElement('div');
    div.className='player'+(p.isDrawer?' is-drawing':'')+(p.guessed?' is-guessed':'')+(isMe?' is-me':'');
    div.innerHTML=`
      <div class="p-avatar" style="background:${PCOLOR[i%5]}22;border-color:${PCOLOR[i%5]}">${PEMOJI[i%5]}</div>
      <div><div class="p-name">${p.name}${isMe?' (나)':''}</div><div class="p-score">${p.score}점</div></div>
      ${p.isDrawer?'<span class="p-badge drawing">그리는 중</span>':p.guessed?'<span class="p-badge guessed">정답!</span>':''}
    `;
    list.appendChild(div);
  });
}

// ── 힌트 바 ──────────────────────────────────────────────
function updateHintBar(len) {
  const bar = document.getElementById('hintBar');
  const n = len || (amDrawer && currentWordKr ? [...currentWordKr].length : 0);
  if (!n || gamePhase!=='playing') { bar.className='hint-bar empty'; return; }
  bar.className='hint-bar';
  bar.innerHTML=Array(n).fill('<div class="hint-circle"></div>').join('')+`<span class="hint-label">${n}글자</span>`;
}

// ── 채팅 ─────────────────────────────────────────────────
function addMsg(text, kind='txt', name='') {
  const area=document.getElementById('chat');
  const div=document.createElement('div');
  div.className='m '+kind;
  div.innerHTML=name?`<span class="mname">${name}</span>${text}`:text;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

document.getElementById('guessIn').addEventListener('keydown', e=>{ if(e.key==='Enter') submitGuess(); });
function submitGuess() {
  const inp=document.getElementById('guessIn');
  const txt=inp.value.trim();
  if(!txt||amDrawer||gamePhase!=='playing') return;
  inp.value='';
  broadcast({ type:'guess', id:myId, text:txt });
}

// ── 게임 종료 ─────────────────────────────────────────────
function showGameEnd() {
  document.getElementById('ovRound').classList.add('hide');
  const sorted=[...players].sort((a,b)=>b.score-a.score);
  const winner=sorted[0];
  const isTie=sorted.length>1&&sorted[0].score===sorted[1].score;
  const wi=players.findIndex(p=>p.id===winner.id);
  document.getElementById('winnerName').textContent=isTie?'🤝 동점!':`${winner.name} 우승! ${PEMOJI[wi%5]}`;
  document.getElementById('winnerMsg').textContent=isTie?`공동 ${winner.score}점!`:`${winner.score}점으로 우승!`;
  const box=document.getElementById('finalScores');
  box.innerHTML='';
  ['🥇','🥈','🥉'].forEach((medal,i)=>{
    if(!sorted[i]) return;
    const pi=players.findIndex(p=>p.id===sorted[i].id);
    const row=document.createElement('div');
    row.style.cssText=`display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;border:1.5px solid ${i===0?'#f4a261':'rgba(26,26,46,0.12)'};background:${i===0?'#fff8ee':'var(--paper)'}`;
    row.innerHTML=`<span style="font-size:20px">${medal}</span><span style="font-size:18px">${PEMOJI[pi%5]}</span><span style="font-size:14px;font-weight:700;flex:1">${sorted[i].name}</span><span style="font-family:'Gaegu',cursive;font-size:20px;font-weight:700;color:${PCOLOR[pi%5]}">${sorted[i].score}점</span>`;
    box.appendChild(row);
  });
  confetti();
  document.getElementById('ovEnd').classList.remove('hide');
}

// ── 캔버스 ────────────────────────────────────────────────
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let drawing=false, lx=0, ly=0, brushColor='#1a1a2e', brushSize=4, erasing=false;

function resize() {
  const w=cv.parentElement.clientWidth, h=Math.max(320,window.innerHeight-320);
  const hasC=cv.width>0&&cv.height>0;
  const img=hasC?ctx.getImageData(0,0,cv.width,cv.height):null;
  cv.width=w; cv.height=h;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
  if(img) ctx.putImageData(img,0,0);
}
window.addEventListener('resize',resize);
setTimeout(resize,60);

function lockCanvas(lock) {
  cv.classList.toggle('locked',lock);
  document.getElementById('toolbar').classList.toggle('toolbar-disabled',lock);
}
function pos(e) {
  const r=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
  return{x:(t.clientX-r.left)*(cv.width/r.width),y:(t.clientY-r.top)*(cv.height/r.height)};
}
cv.addEventListener('mousedown',e=>{if(!amDrawer)return;drawing=true;const p=pos(e);lx=p.x;ly=p.y;});
cv.addEventListener('mousemove',e=>{if(!drawing||!amDrawer)return;const p=pos(e);paintLocal(lx,ly,p.x,p.y);broadcast({type:'draw',x1:lx,y1:ly,x2:p.x,y2:p.y,color:erasing?'#fff':brushColor,size:erasing?brushSize*3:brushSize});lx=p.x;ly=p.y;});
cv.addEventListener('mouseup',()=>drawing=false);
cv.addEventListener('mouseleave',()=>drawing=false);
cv.addEventListener('touchstart',e=>{e.preventDefault();if(!amDrawer)return;drawing=true;const p=pos(e);lx=p.x;ly=p.y;},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();if(!drawing||!amDrawer)return;const p=pos(e);paintLocal(lx,ly,p.x,p.y);broadcast({type:'draw',x1:lx,y1:ly,x2:p.x,y2:p.y,color:erasing?'#fff':brushColor,size:erasing?brushSize*3:brushSize});lx=p.x;ly=p.y;},{passive:false});
cv.addEventListener('touchend',()=>drawing=false);

function paintLocal(x1,y1,x2,y2,color,size) {
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
  ctx.strokeStyle=color||(erasing?'#fff':brushColor);
  ctx.lineWidth=size||(erasing?brushSize*3:brushSize);
  ctx.lineCap=ctx.lineJoin='round';ctx.stroke();
}
function remoteDraw(d){paintLocal(d.x1,d.y1,d.x2,d.y2,d.color,d.size);}
function clearCanvasLocal(){ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);}
function doClean(){clearCanvasLocal();broadcast({type:'clearCanvas'});addMsg('캔버스를 지웠어요.','sys');}
function setSize(s,btn){brushSize=s;document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function toggleEraser(){erasing=!erasing;document.getElementById('eraserBtn').classList.toggle('on',erasing);cv.style.cursor=erasing?'cell':'crosshair';}

(function(){
  const wrap=document.getElementById('colorPicker');
  COLORS_PALETTE.forEach(c=>{
    const b=document.createElement('button');
    b.className='c-btn'+(c===brushColor?' on':'');
    b.style.background=c;
    if(c==='#ffffff') b.style.border='2px solid rgba(255,255,255,0.45)';
    b.onclick=()=>{brushColor=c;erasing=false;document.getElementById('eraserBtn').classList.remove('on');cv.style.cursor='crosshair';document.querySelectorAll('.c-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');};
    wrap.appendChild(b);
  });
})();

function confetti(){
  const wrap=document.getElementById('confWrap');
  const colors=['#e63946','#f4a261','#2a9d8f','#457b9d','#e9c46a','#a8dadc'];
  for(let i=0;i<55;i++){
    const el=document.createElement('div');el.className='conf';
    const sz=7+Math.random()*9;
    el.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.4+Math.random()*1.8}s;animation-delay:${Math.random()*.4}s;`;
    wrap.appendChild(el);setTimeout(()=>el.remove(),3200);
  }
}
</script>
